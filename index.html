<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Família Online</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #ece5dd;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #075E54;
      color: white;
      padding: 15px;
      text-align: center;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      max-width: 75%;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
    }

    .me { background: #DCF8C6; margin-left: auto; }
    .other { background: white; margin-right: auto; }

    footer {
      display: flex;
      padding: 10px;
      background: #eee;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      border: none;
      border-radius: 50%;
      background: #25D366;
      color: white;
    }
  </style>
</head>

<body>

<header>👨‍👩‍👧 Chat da Família</header>

<div id="chat"></div>

<footer>
  <input id="msg" placeholder="Mensagem...">
  <button onclick="send()">➤</button>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    query,
    orderBy,
    onSnapshot
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 🔥 COLE SUA CONFIG AQUI
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCK8odwL9Q4IVGml5crFHhhNS4UpTSR_r4",
  authDomain: "chatfamiliar-e6fa1.firebaseapp.com",
  projectId: "chatfamiliar-e6fa1",
  storageBucket: "chatfamiliar-e6fa1.firebasestorage.app",
  messagingSenderId: "864418873935",
  appId: "1:864418873935:web:15528a0b92dcabb58ae03a",
  measurementId: "G-3CSKLP1HVX"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let user = localStorage.getItem("user");

  if (!user) {
    user = prompt("Seu nome:");
    localStorage.setItem("user", user);
  }

  const chat = document.getElementById("chat");

  function render(data) {
    chat.innerHTML = "";

    data.forEach(doc => {
      const msg = doc.data();

      const div = document.createElement("div");
      div.className = "msg " + (msg.user === user ? "me" : "other");

      div.innerHTML = `<b>${msg.user}</b><br>${msg.text}`;

      chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
  }

  const q = query(collection(db, "messages"), orderBy("time"));

  onSnapshot(q, snapshot => {
    render(snapshot.docs);
  });

  window.send = async function () {
    const input = document.getElementById("msg");

    if (!input.value) return;

    await addDoc(collection(db, "messages"), {
      user: user,
      text: input.value,
      time: Date.now()
    });

    input.value = "";
  };
</script>

</body>
</html>
